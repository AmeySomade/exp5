version: '3.8'

services:
  ml-api:
    build:
      context: .
      dockerfile: Dockerfile.multi
    image: ml-api:v1.0.0
    container_name: ml-api-container
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=info
      - MODEL_PATH=/app/models/model.pkl
      - ENVIRONMENT=development
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  default:
    name: ml-network